<div class="section-container">
    <div class="section-header">
        <h3 style="font-weight:600;">
            Manajemen Merchant
        </h3>
        <button class="btn-action btn-sm-success" style="padding:8px 16px;" onclick="openMerchantModal()">
            + Tambah Merchant
        </button>
    </div>

    <div class="responsive-table">
        <table class="enterprise-table">
            <thead>
                <tr>
                    <th>Kode</th>
                    <th>Merchant</th>
                    <th>Pemilik</th>
                    <th>No. HP</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="merchant-table-body">
                <tr>
                    <td colspan="6" style="text-align:center;padding:25px;">
                        Memuat data merchant...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- ===================================== -->
<!-- MODAL KELOLA MERCHANT -->
<!-- ===================================== -->

<div id="merchant-modal" class="modal-overlay">

    <div class="modal-box" style="max-width:700px;">

        <div class="modal-header">

            <h3>Kelola Merchant</h3>

            <button class="modal-close" onclick="closeMerchantModal()">

                <i class="fa-solid fa-xmark"></i>

            </button>

        </div>

        <div class="modal-body">

            <input type="hidden" id="merchant-id">

            <div class="form-group">

                <label>Nama Merchant</label>

                <input type="text" id="merchant-name" class="form-control">

            </div>

            <div class="form-group">

                <label>Nama Pemilik</label>

                <input type="text" id="merchant-owner" class="form-control">

            </div>

            <div class="form-group">

                <label>No. HP</label>

                <input type="text" id="merchant-phone" class="form-control">

            </div>

            <div class="form-group">

                <label>Email</label>

                <input type="email" id="merchant-email" class="form-control">

            </div>

            <div class="form-group">

                <label>Status</label>

                <select id="merchant-status" class="form-control">

                    <option value="Pending">Pending</option>
                    <option value="Aktif">Aktif</option>
                    <option value="Suspend">Suspend</option>
                    <option value="Nonaktif">Nonaktif</option>

                </select>

            </div>

        </div>

        <div class="modal-footer">

            <button class="btn-action" onclick="closeMerchantModal()">

                Batal

            </button>

            <button class="btn-primary" onclick="saveMerchant()">

                Simpan Perubahan

            </button>

        </div>

    </div>

</div>
