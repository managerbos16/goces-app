<div class="section-container">
    <h3 style="margin-bottom:20px; font-weight:600;">Konfigurasi Sistem Global</h3>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
        <div class="form-group"><label>Nama Aplikasi</label><input type="text" class="form-control" value="GOCES"></div>
        <div class="form-group"><label>Email Operasional</label><input type="text" class="form-control"
                value="support@goces.com"></div>
        <div class="form-group"><label>Mata Uang Default</label><input type="text" class="form-control"
                value="IDR (Rupiah)" disabled></div>
        <div class="form-group">
            <label>Mode Pemeliharaan (Maintenance Mode)</label>
            <select class="form-control">
                <option>Non-Aktif (Sistem Operasional)</option>
                <option>Aktifkan Mode Maintenance</option>
            </select>
        </div>
    </div>
    <button class="btn-primary" style="margin-top:20px; width:auto; padding:10px 24px;"
        onclick="showNotification('Konfigurasi sistem berhasil disimpan')">Simpan Konfigurasi</button>
</div>
