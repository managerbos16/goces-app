<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>GOCES</title>
    <link rel="stylesheet" href="https://goces-app.vercel.app/css/style.css">
    <link rel="stylesheet" href="https://goces-app.vercel.app/css/navigation.css">
    <link rel="stylesheet" href="https://goces-app.vercel.app/css/responsive.css">
    <link rel="stylesheet" href="https://goces-app.vercel.app/css/home/header.css">
    <link rel="stylesheet" href="https://goces-app.vercel.app/css/home/wallet.css">
    <link rel="stylesheet" href="https://goces-app.vercel.app/css/home/shortcut.css">
    <link rel="stylesheet" href="https://goces-app.vercel.app/css/home/slider.css">
    <link rel="stylesheet" href="https://goces-app.vercel.app/css/food/food.css">
</head>

<body>

    <div class="goces-app">

        <section id="page-home" class="goces-page goces-active">
            <header class="goces-home-header">
                <div class="goces-hdr-ambient-glow"></div>
                <div class="goces-hdr-bg-decor-1"></div>
                <div class="goces-hdr-bg-decor-2"></div>
                <div class="goces-hdr-glass-highlight"></div>

                <div class="goces-hdr-upper-row">
                    <div class="goces-hdr-left-zone">
                        <a href="action://act/profile" class="goces-hdr-profile-wrapper">
                            <img src="{foto}" alt="{nama}" class="goces-hdr-profile-photo">
                        </a>
                    </div>

                    <div class="goces-hdr-right-zone">
                        <a href="action://act/message_list" class="goces-hdr-glass-btn" aria-label="Messages">
                            <span class="goces-hdr-status-badge">{jumlah_pesan}</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                            </svg>
                        </a>

                        <a href="action://act/cart" class="goces-hdr-glass-btn" aria-label="Cart">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="9" cy="21" r="1"></circle>
                                <circle cx="20" cy="21" r="1"></circle>
                                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                            </svg>
                        </a>
                    </div>
                </div>

                <div class="goces-hdr-lower-row">
                    <form action="action://act/search" class="goces-hdr-search-container">
                        <button type="submit" class="goces-hdr-search-trigger" aria-label="Search">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </button>
                        <input type="search" name="search" class="goces-hdr-search-input"
                            placeholder="Cari makanan, toko, atau layanan...">
                    </form>
                </div>
            </header>

            <section class="goces-wallet-section">
                <div class="goces-wallet-card">
                    <div class="goces-ambient-glow"></div>
                    <div class="goces-card-highlight"></div>
                    <div class="goces-card-watermark">G</div>

                    <div class="goces-card-header">
                        <div class="goces-brand-title">GOCESPAY</div>
                        <a href="action://act/customer_points" class="goces-badge-points">
                            <svg class="goces-star-svg" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2l2.9 6 6.6.6-5 4.3 1.5 6.4L12 16.8 6 19.3l1.5-6.4-5-4.3 6.6-.6L12 2z" />
                            </svg>
                            <span class="goces-points-value">{poin} <small>Poin</small></span>
                        </a>
                    </div>

                    <div class="goces-balance-display-zone">
                        <div class="goces-balance-flex-wrapper">
                            <a href="action://act/account" class="goces-anchor-saldo">
                                <span id="walletBalance" data-balance="{saldo}">{saldo}</span>
                            </a>
                            <button id="toggleBalance" class="goces-haptic-eye-trigger"
                                aria-label="Toggle Balance Visibility">
                                <svg class="goces-eye-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path class="eye-contour" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                    <circle class="eye-iris" cx="12" cy="12" r="3" />
                                    <line class="eye-diagonal-mask" x1="2" y1="2" x2="22" y2="22" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="goces-card-hairline"></div>

                    <div class="goces-action-grid-menu">
                        <a href="action://act/withdraw" class="goces-action-item">
                            <div class="goces-icon-capsule style-blue">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <polyline points="19 12 12 19 5 12"></polyline>
                                </svg>
                            </div>
                            <span>Tarik</span>
                        </a>

                        <a href="javascript:void(0)" class="goces-action-item">
                            <div class="goces-icon-capsule style-purple">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="7" y1="17" x2="17" y2="7"></line>
                                    <polyline points="7 7 17 7 17 17"></polyline>
                                </svg>
                            </div>
                            <span>Transfer</span>
                        </a>

                        <a href="action://act/topup" class="goces-action-item">
                            <div class="goces-icon-capsule style-green">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                            </div>
                            <span>Top Up</span>
                        </a>

                        <a href="action://act/account" class="goces-action-item">
                            <div class="goces-icon-capsule style-orange">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="1"></circle>
                                    <circle cx="19" cy="12" r="1"></circle>
                                    <circle cx="5" cy="12" r="1"></circle>
                                </svg>
                            </div>
                            <span>Lainnya</span>
                        </a>
                    </div>
                </div>
            </section>

            <section class="goces-shortcuts-section">
                <div class="goces-shortcuts-grid">
                    <a href="action://act/ride" class="goces-shortcut-item">
                        <div class="goces-shortcut-icon-frame">
                            <div class="goces-shortcut-ambient-glow"></div>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M5 16a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />
                                <path d="M19 16a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />
                                <path d="M7.5 13h9" />
                                <path d="M12 10V5l3 1" />
                            </svg>
                        </div>
                        <span class="goces-shortcut-label">GoRide</span>
                    </a>

                    <a href="action://act/car" class="goces-shortcut-item">
                        <div class="goces-shortcut-icon-frame">
                            <div class="goces-shortcut-ambient-glow"></div>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 1 13v3c0 .6.4 1 1 1h2" />
                                <circle cx="7" cy="17" r="2" />
                                <path d="M9 17h6" />
                                <circle cx="17" cy="17" r="2" />
                            </svg>
                        </div>
                        <span class="goces-shortcut-label">GoCar</span>
                    </a>

                    <a href="#" class="goces-shortcut-item" onclick="showPage('food');return false;">
                        <div class="goces-shortcut-icon-frame">
                            <div class="goces-shortcut-ambient-glow"></div>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                            </svg>
                        </div>
                        <span class="goces-shortcut-label">GoFood</span>
                    </a>

                    <a href="action://act/delivery" class="goces-shortcut-item">
                        <div class="goces-shortcut-icon-frame">
                            <div class="goces-shortcut-ambient-glow"></div>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
                                <line x1="8" y1="21" x2="16" y2="21" />
                                <line x1="12" y1="17" x2="12" y2="21" />
                            </svg>
                        </div>
                        <span class="goces-shortcut-label">Delivery</span>
                    </a>

                    <a href="action://act/shop" class="goces-shortcut-item">
                        <div class="goces-shortcut-icon-frame">
                            <div class="goces-shortcut-ambient-glow"></div>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                                <line x1="3" y1="6" x2="21" y2="6" />
                                <path d="M16 10a4 4 0 0 1-8 0" />
                            </svg>
                        </div>
                        <span class="goces-shortcut-label">Shop</span>
                    </a>

                    <a href="action://act/fresh" class="goces-shortcut-item">
                        <div class="goces-shortcut-icon-frame">
                            <div class="goces-shortcut-ambient-glow"></div>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 2a5 5 0 0 0-5 5v3a5 5 0 0 0 10 0V7a5 5 0 0 0-5-5z" />
                                <path d="M12 15a7 7 0 0 0-7 7h14a7 7 0 0 0-7-7z" />
                            </svg>
                        </div>
                        <span class="goces-shortcut-label">Fresh</span>
                    </a>

                    <a href="" class="goces-shortcut-item">
                        <div class="goces-shortcut-icon-frame">
                            <div class="goces-shortcut-ambient-glow"></div>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="4" width="20" height="16" rx="2" />
                                <line x1="2" y1="10" x2="22" y2="10" />
                            </svg>
                        </div>
                        <span class="goces-shortcut-label">PPOB</span>
                    </a>

                    <a href="" class="goces-shortcut-item">
                        <div class="goces-shortcut-icon-frame">
                            <div class="goces-shortcut-ambient-glow"></div>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                                <line x1="16" y1="2" x2="16" y2="6" />
                                <line x1="8" y1="2" x2="8" y2="6" />
                                <line x1="3" y1="10" x2="21" y2="10" />
                            </svg>
                        </div>
                        <span class="goces-shortcut-label">Rental</span>
                    </a>

                </div>
            </section>

        </section>

        <section id="page-food" class="goces-page">
        </section>

        <section id="page-ride" class="goces-page">
        </section>

        <section id="page-car" class="goces-page">
        </section>

        <section id="page-delivery" class="goces-page">
        </section>

        <section id="page-shop" class="goces-page">
        </section>

        <section id="page-fresh" class="goces-page">
        </section>

        <section id="page-ppob" class="goces-page">
        </section>

        <section id="page-rental" class="goces-page">
        </section>

        <section id="page-promo" class="goces-page">
        </section>

        <section id="page-qris" class="goces-page">
        </section>

        <section id="page-aktivitas" class="goces-page">
        </section>

        <section id="page-chat" class="goces-page">
        </section>

        <nav class="goces-bottom-nav">
            <button class="goces-nav-item goces-active" data-page="home">
                <div class="goces-nav-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M4 10.8L12 4l8 6.8V20a1.5 1.5 0 0 1-1.5 1.5h-3.5v-5h-6v5H5.5A1.5 1.5 0 0 1 4 20z" />
                    </svg>
                </div>
                <div class="goces-nav-label">
                    Home
                </div>
            </button>

            <button class="goces-nav-item" data-page="promo">
                <div class="goces-nav-icon">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M20 12.5L12.5 20a2 2 0 0 1-2.8 0L3.8 14a2 2 0 0 1 0-2.8l7.4-7.4A2 2 0 0 1 12.6 3H19a2 2 0 0 1 2 2v6.3a2 2 0 0 1-.6 1.2z" />
                        <circle cx="16.2" cy="7.8" r="1.2" />
                    </svg>
                </div>
                <div class="goces-nav-label">
                    Promo
                </div>
            </button>

            <button class="goces-qris-btn" data-page="qris">
                <div class="goces-qris-circle">
                    <svg viewBox="0 0 24 24">
                        <rect x="4" y="4" width="5" height="5" rx="1" />
                        <rect x="15" y="4" width="5" height="5" rx="1" />
                        <rect x="4" y="15" width="5" height="5" rx="1" />
                        <path d="M15 15h2v2h-2zm3 0h2v5h-2zm-3 3h5" />
                    </svg>
                </div>
            </button>

            <button class="goces-nav-item" data-page="aktivitas">
                <div class="goces-nav-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M4 18l5-6 4 3 7-9" />
                        <circle cx="4" cy="18" r="1" />
                        <circle cx="9" cy="12" r="1" />
                        <circle cx="13" cy="15" r="1" />
                        <circle cx="20" cy="6" r="1" />
                    </svg>
                </div>
                <div class="goces-nav-label">
                    Aktivitas
                </div>
            </button>

            <button class="goces-nav-item" data-page="chat">
                <div class="goces-nav-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M5 5h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H9l-5 4v-4H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z" />
                    </svg>
                </div>
                <div class="goces-nav-label">
                    Chat
                </div>
            </button>
        </nav>
    </div>

    <script src="https://goces-app.vercel.app/js/router.js"></script>
    <script src="https://goces-app.vercel.app/js/navigation.js"></script>
    <script src="https://goces-app.vercel.app/js/app.js"></script>
    <script src="https://goces-app.vercel.app/js/home/header.js"></script>
    <script src="https://goces-app.vercel.app/js/home/wallet.js"></script>
    <script src="https://goces-app.vercel.app/js/home/shortcut.js"></script>
    <script src="https://goces-app.vercel.app/js/home/slider.js"></script>
    <script src="https://goces-app.vercel.app/js/food/food.js"></script>

</body>

</html>
