<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Donasi - GOCES Peduli</title>

    <link rel="stylesheet" href="payment.css">

</head>

<body>

    <!--==================================
            HEADER
    ==================================-->

    <header class="gpay-header">

        <button class="gpay-back" onclick="history.back()">

            ←

        </button>

        <h1>Donasi</h1>

    </header>

    <!--==================================
            LOADING
    ==================================-->

    <div id="gpayLoading" class="gpay-loading">

        Memuat campaign...

    </div>

    <!--==================================
            CONTENT
    ==================================-->

    <main id="gpayContent" class="gpay-content" style="display:none;">

        <!-- Campaign -->

        <section class="gpay-campaign">

            <img id="gpayImage" src="" alt="Campaign">

            <div class="gpay-info">

                <span class="gpay-badge">

                    ❤️ GOCES Peduli

                </span>

                <h2 id="gpayTitle"></h2>

                <p id="gpayTarget"></p>

            </div>

        </section>

        <!--==================================
                FORM DONATUR
        ==================================-->

        <section class="gpay-card">

            <h3>Data Donatur</h3>

            <div class="gpay-group">

                <label>Nama Lengkap</label>

                <input type="text" id="donorName" placeholder="Masukkan nama lengkap">

            </div>

            <div class="gpay-group">

                <label>Email</label>

                <input type="email" id="donorEmail" placeholder="contoh@email.com">

            </div>

            <div class="gpay-group">

                <label>Nomor WhatsApp</label>

                <input type="tel" id="donorPhone" placeholder="08xxxxxxxxxx">

            </div>

            <div class="gpay-check">

                <input type="checkbox" id="isAnonymous">

                <label for="isAnonymous">

                    Tampilkan sebagai Donatur Anonim

                </label>

            </div>

        </section>

        <!--==================================
                NOMINAL
        ==================================-->

        <section class="gpay-card">

            <h3>Nominal Donasi</h3>

            <input type="number" id="donationAmount" value="10000" min="10000" step="1000">

            <div class="gpay-quick">

                <button data-value="10000">

                    10 Ribu

                </button>

                <button data-value="25000">

                    25 Ribu

                </button>

                <button data-value="50000">

                    50 Ribu

                </button>

                <button data-value="100000">

                    100 Ribu

                </button>

            </div>

        </section>

        <!--==================================
                PEMBAYARAN
        ==================================-->

        <section class="gpay-card">

            <h3>Metode Pembayaran</h3>

            <label class="gpay-method">

                <input type="radio" name="paymentMethod" value="QRIS" checked>

                <span>

                    QRIS (Semua E-Wallet & Mobile Banking)

                </span>

            </label>

        </section>

        <!--==================================
                TOTAL
        ==================================-->

        <section class="gpay-summary">

            <div>

                <span>Total Donasi</span>

                <strong id="gpayTotal">

                    Rp10.000

                </strong>

            </div>

        </section>

    </main>

    <!--==================================
            FOOTER
    ==================================-->

    <footer class="gpay-footer">

        <button id="gpaySubmit">

            Lanjutkan Pembayaran

        </button>

    </footer>

    <script src="payment.js"></script>

</body>

</html>
