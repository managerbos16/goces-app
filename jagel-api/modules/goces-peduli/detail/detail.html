<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GOCES Peduli</title>

    <link rel="stylesheet" href="detail.css">

</head>

<body>

    <!--==============================
            HEADER
    ==============================-->

    <header class="gpd-header">

        <button class="gpd-back" onclick="history.back()">

            ←

        </button>

        <h1>Detail Donasi</h1>

    </header>

    <!--==============================
            LOADING
    ==============================-->

    <div id="gpdLoading" class="gpd-loading">

        Memuat data...

    </div>

    <!--==============================
            CONTENT
    ==============================-->

    <main id="gpdContent" class="gpd-content" style="display:none;">

        <!-- Banner -->

        <div class="gpd-banner">

            <img id="gpdImage" src="" alt="">

            <span id="gpdCategory" class="gpd-category">

            </span>

        </div>

        <!-- Card -->

        <section class="gpd-card">

            <h2 id="gpdTitle"></h2>

            <p id="gpdDescription"></p>

            <!-- Progress -->

            <div class="gpd-progress-info">

                <span id="gpdCollected">

                    Rp0

                </span>

                <span id="gpdPercent">

                    0%

                </span>

            </div>

            <div class="gpd-progress">

                <div id="gpdBar" class="gpd-progress-bar">

                </div>

            </div>

            <div class="gpd-target">

                <span>

                    Target Donasi

                </span>

                <strong id="gpdTarget">

                    Rp0

                </strong>

            </div>

            <div class="gpd-donatur">

                👥

                <strong id="gpdDonor">

                    0

                </strong>

                Donatur

            </div>

        </section>

        <!-- Tentang -->

        <section class="gpd-about">

            <h3>

                Tentang Donasi

            </h3>

            <p id="gpdAbout"></p>

        </section>

    </main>

    <!--==============================
            FOOTER
    ==============================-->

    <footer class="gpd-footer">

        <button id="gpdDonate">

            Donasi Sekarang

        </button>

    </footer>

    <script src="detail.js"></script>

</body>

</html>
